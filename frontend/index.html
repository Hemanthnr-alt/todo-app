<!DOCTYPE html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>30 — Stay on top of everything</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@600;700;800;900&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      /* Prevent flash — set bg before React hydrates */
      html { background: #000; }
      html[data-theme="light"] { background: #F2F2F7; }
      body { font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; background: transparent; }

      /* The selects styling will be handled in index.css relying on theme */

      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: rgba(107,70,255,0.3); border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: rgba(107,70,255,0.5); }
      ::selection { background: rgba(107,70,255,0.25); color: inherit; }
    </style>
    <!-- Blocking theme script — sets data-theme before first paint -->
    <script>
      (function() {
        var t = localStorage.getItem('theme') || 'dark';
        document.documentElement.setAttribute('data-theme', t);
        document.documentElement.style.background = t === 'light' ? '#F2F2F7' : '#000000';
        var a = localStorage.getItem('accent') || '#6B46FF';
        document.documentElement.style.setProperty('--accent', a);
        document.documentElement.style.setProperty('--accent-subtle', a + '26');
        document.documentElement.style.setProperty('--accent-glow',   a + '66');
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
